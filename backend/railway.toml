[build]
builder = "NIXPACKS"

[build.env]
PYTHON_VERSION = "3.11"

[deploy]
startCommand = "alembic upgrade head && python -c \"import asyncio, os; from sqlalchemy.ext.asyncio import create_async_engine, async_sessionmaker, AsyncSession; from sqlalchemy import text; engine = create_async_engine(os.environ['DATABASE_URL']); Session = async_sessionmaker(engine, class_=AsyncSession); \nasync def check(): \n  async with Session() as db: \n    r = await db.execute(text('SELECT COUNT(*) FROM users')); return r.scalar()\ncount = asyncio.run(check())\nprint(f'Users: {count}')\nif count == 0: import subprocess; subprocess.run(['python', 'seed.py'], check=True)\n\" && uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[healthcheck]
httpPath = "/api/health"
timeoutSecs = 30
